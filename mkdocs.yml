site_name: Comet Hunter
site_description: LASCO comet processing pipeline
site_author: Anand Krishna

theme:
  name: material

docs_dir: docs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            show_source: false
            show_root_heading: true
            show_signature: true
            separate_signature: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite
  - pymdownx.superfences

nav:
  - Home: index.md

  - Architecture:
      - Overview: architecture.md
      - Pipeline: pipeline.md
      - Processing Pipeline: processing_pipeline.md
      - Database: database_schema.md

  - Domain:
      - Downlink Slot: domain/downlink_slot.md
      - File Metadata: domain/file_metadata.md
      - Processed File: domain/processed_file.md

  - Services:
      - Slot Service: services/slot_service.md
      - Metadata Service: services/metadata_service.md
      - Download Service: services/download_file_service.md
      - Process Service: services/process_file_service.md

  - Repositories:
      - Slot Repository: repositories/downlink_slot_repository.md
      - Metadata Repository: repositories/file_metadata_repository.md
      - Processed Repository: repositories/processed_file_repository.md

  - Infrastructure:
      - Database Base: infrastructure/database_base.md
      - Query Executor: infrastructure/query_executor.md
      - Query Spec: infrastructure/query_spec.md